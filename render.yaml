# render.yaml — Render Blueprint
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: savoria-restaurant
    env: python
    region: singapore  # closest free region to India
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true   # Render auto-generates a secure secret
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: savoria-db
          property: connectionString
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false   # set manually in Render dashboard
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

databases:
  - name: savoria-db
    plan: free
    databaseName: savoria
    user: savoria_user
